<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博运势 - 诚心博杯</title>
    <style>
        body { font-family: sans-serif; background: #f4f1ea; color: #333; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        .fortune-score { font-size: 48px; font-weight: bold; color: #d32f2f; }
        button { background: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 16px; cursor: pointer; }
        #cup-result { font-size: 24px; margin-top: 15px; font-weight: bold; color: #b8860b; }
    </style>
</head>
<body>

    <h2>⛩️ 今日运势看板</h2>
    <div class="card">
        <div>今日运气值</div>
        <div class="fortune-score" id="score">--</div>
        <p id="time-shichen"></p>
        <p><strong>宜：</strong><span id="yi">加载中...</span></p>
        <p><strong>忌：</strong><span id="ji">加载中...</span></p>
    </div>

    <h2>🙏 诚心博杯</h2>
    <div class="card">
        <p>闭眼默念心事，点击掷筊</p>
        <button onclick="boBei()">掷筊 (Throw Cup)</button>
        <div id="cup-result">等待掷出...</div>
    </div>

    <script>
        // 1. 生成随机运气值
        document.getElementById('score').innerText = Math.floor(Math.random() * 41) + 60; // 生成60-100的随机数

        // 2. 简单的宜忌逻辑
        const yiList = ["代码无Bug", "遇到贵人", "喝奶茶", "早睡", "坚持运动"];
        const jiList = ["钻牛角尖", "冲动消费", "熬夜", "乱发脾气", "不吃早餐"];
        document.getElementById('yi').innerText = yiList[Math.floor(Math.random() * yiList.length)];
        document.getElementById('ji').innerText = jiList[Math.floor(Math.random() * jiList.length)];

        // 3. 博杯逻辑
        function boBei() {
            const results = ["【圣杯】✨ 神明准了！", "【笑杯】😊 神明在笑，再求一次？", "【怒杯】💢 神明不准，先退下吧"];
            const r = Math.random();
            let finalResult = "";
            if (r < 0.5) finalResult = results[0]; // 50%圣杯
            else if (r < 0.75) finalResult = results[1]; // 25%笑杯
            else finalResult = results[2]; // 25%怒杯
            
            document.getElementById('cup-result').innerText = finalResult;
        }
    </script>
</body>
</html>
